<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WIEM Monitor</title>
</head>
<body>
    <h1>WIEM - Monitor de Audio</h1>
    <button id="btn">Conectar</button>
    <p id="estado">Desconectado</p>

    <script>
let audioCtx = null;
let nextPlayTime = 0;
let ws = null;

document.getElementById('btn').addEventListener('click', () => {
    const estado = document.getElementById('estado');

    // Creamos el contexto DENTRO del click para que el browser lo permita
    audioCtx = new AudioContext({ sampleRate: 48000 });
    nextPlayTime = 0;

    ws = new WebSocket(`ws://${location.host}/ws`);
    ws.binaryType = 'arraybuffer';

    estado.textContent = 'Conectando...';

    ws.onopen = () => {
        estado.textContent = 'Conectado';
    };

    ws.onmessage = (event) => {
        const float32Array = new Float32Array(event.data);
        const buffer = audioCtx.createBuffer(1, float32Array.length, 48000);
        buffer.copyToChannel(float32Array, 0);

        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);

        const currentTime = audioCtx.currentTime;
        if (nextPlayTime < currentTime) {
            nextPlayTime = currentTime + 0.01;
        }

        source.start(nextPlayTime);
        nextPlayTime += buffer.duration;
    };

    ws.onclose = () => {
        estado.textContent = 'Desconectado';
    };
});
    </script>
</body>
</html>
